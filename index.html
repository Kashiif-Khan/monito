<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mento</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="w-full h-screen">
    <section class="w-full h-screen bg-[#FCEED5]">
      
      <div class="left-0 top-0 absolute ">
        <img src="resources/Rectangle 9.png" alt="" class="w-[480px]" />
      </div>

      <!-- Hero Section -->
      <header class="w-full h-20 border border-gray-300 flex justify-between items-center px-6">
        <nav class="w-full">
          <div class="w-full flex justify-between items-center">
            <!-- Left box -->
            <div class="relative z-10 flex items-center gap-0 flex-col pl-20">
              <img src="resources/Group.png" alt="" class="h-8" />
              <p class="text-[#103559] font-bold">Pets For Best</p>
            </div>

            
            <div>
                <ul class="hidden md:flex text-[#103559] font-bold flex-row gap-20">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Category</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>

            <!-- Right box -->
            <div class="flex items-center gap-4">
              
              <div class="flex items-center border rounded w-[300px] h-10 bg-[#FDFDFD]  rounded-tl-full rounded-bl-full rounded-tr-full rounded-br-full ">
                <img src="resources/u_search.png" alt="" class="w-5 m-2 bg-[#FDFDFD]"/>
                <input type="search"placeholder="search something here!"class="outline-none text-sm "/>
              </div>

              
              <button class="bg-[#103559] text-white px-4 py-2 rounded-full hover:bg-[#0d2a47]">Join our community</button>

              
              <div class="flex items-center gap-1">
                <img src="resources/Frame 45.png" alt="" class="w-10" />
                <span class="text-[#103559]">VND</span>
                <img src="resources/Vector.png" alt="" class="w-3" />
              </div>

            </div>
          </div>
        </nav>
      </header>


    </section>
  </body>
</html>
