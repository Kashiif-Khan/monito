<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
  </head>
  <body class="w-full h-screen">
    <div class="w-full h-screen bg-[#FCEED5] relative">
      <!-- Hero Section Background Image -->
      <div class="left-0 top-0 absolute">
        <img src="resources/Rectangle 9.png" alt="" class="w-[480px]" />
      </div>

      <!-- Header -->
      <div class="w-full h-20 border border-gray-300 flex justify-between items-center px-6 relative z-10">
          <div class="w-full flex md:justify-between md:items-center space-x-4">
            <!-- Left box (Hamburger) -->
            <div class="md:hidden flex items-center block z-10 text-2xl">
              <i class="fa fa-bars"></i>
            </div>

            <!-- Logo -->
            <div class="relative z-10 flex items-center gap-0 flex-col pl-20">
              <img src="resources/Group.png" alt="" class="h-8" />
              <p class="text-[#103559] font-bold">Pets For Best</p>
            </div>

            <!-- Navigation -->
            <div class="">
              <ul class=" hidden md:flex md:text-[#103559] md:font-bold md:flex-row md:gap-10 pr-10 ">
                <li><a href="#">Home</a></li>
                <li><a href="#">Category</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
              </ul>
            </div>
          </div>
          <!-- Right box -->
          <div class="text-2xl flex justify-center items-center md:hidden"> <!--for mobile-->
            <i class="fa fa-search"></i>
          </div>

          <div class="hidden md:flex md:items-center md:gap-4  ">
            <!-- Search Box -->
              <div class="hidden md:flex md:items-center  md:w-[300px] md:h-10 md:bg-[#FDFDFD] md:rounded-full" >
                <img src="resources/u_search.png" alt="" class="md:w-5 md:m-2 md:bg-[#FDFDFD]"/>
                <input type="search" placeholder="search something here!" class="md:outline-none md:text-sm" />
              </div>

            <!-- Button -->
            <button class="hidden md:bg-[#103559] md:text-white md:px-4 md:py-2 md:rounded-full md:hover:bg-[#0d2a47]">Join our community</button>

            <!-- Currency -->
            <div class="hidden md:flex md:items-center md:gap-1">
              <img src="resources/Frame 45.png" alt="" class="w-10" />
              <span class="text-[#103559]">VND</span>
              <img src="resources/Vector.png" alt="" class="w-3" />
            </div>
          </div>
        
      </div>
    </div>
  </body>
</html>
